apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-results
  template:
    metadata:
      labels:
        app: student-results
    spec:
      containers:
      - name: web-app
        # Replace with your actual Docker Hub image path
        image: your_docker_hub_id/student-results:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  selector:
    app: student-results
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      # This is the port you will use to view the app in your browser
      nodePort: 30007 
