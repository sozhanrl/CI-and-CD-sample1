apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-results
  template:
    metadata:
      labels:
        app: student-results
    spec:
      containers:
      - name: student-results-container
        image: your_docker_hub_username/student-results:latest # Set your image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  selector:
    app: student-results
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001 # Access via http://<node-ip>:30001
